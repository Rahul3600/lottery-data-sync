name: Lottery Data Sync

on:
  schedule:
    # Run exactly at the official Nagaland State Lottery draw times (IST)
    # IST = UTC + 5:30, so subtract 5:30 from IST to get UTC
    - cron: '30 7 * * *'   # 1:00 PM IST  (07:30 UTC)
    - cron: '30 12 * * *'  # 6:00 PM IST  (12:30 UTC)
    - cron: '30 14 * * *'  # 8:00 PM IST  (14:30 UTC)
  workflow_dispatch:        # Allows you to run this workflow manually from Actions tab

jobs:
  sync-lottery-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
        
      - name: Install dependencies
        run: pip install requests pytesseract pillow pillow-avif-plugin PyMuPDF
        
      - name: Run lottery fetcher
        env:
          # This pulls the Webhook URL from your GitHub Repository Secrets
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: python scripts/lottery_fetcher.py
